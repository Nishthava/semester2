<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div id="search-bar">
            <input type="text" id="location" placeholder="Enter Location" style="background-color: slategray;"/>
            <button  id="btn"style="background-color: white;">search</button>
        </div>
    </header>
    <main>
     <div id="main-content">
         <div id="tempetarure">
             <p>123 °C</p>
         </div>
         <div id="place-date-time">
             <div class="place">Delhi</div>
             <div class="date-day-time">
                 <span class="time">9:15</span>
                 <span class="day">Friday</span>
                 <span class="date">2026-01-30</span>
             </div>
         </div>
         <div id="weather-condition">
             <div class="icon"> 
                 <img src="//cdn.weatherapi.com/weather/64x64/night/143.png"
               alt="weather-status-icon"
              />
             </div>
             <div class="condition">Sunny</div>
          </div>  
      </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
